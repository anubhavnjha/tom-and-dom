    <button class="nav-search-pill" id="navSearchBtn" aria-label="Search poems">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5" stroke-width="1.5"/>
        <path d="M11 11L14.5 14.5" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <ul class="nav-links">
  <li><a href="index.html">home</a></li>

    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-nav" id="mobileNav" aria-hidden="true">
  <a href="index.html" class="mobile-link">home</a>
  <a href="index.html#about" class="mobile-link">about us</a>
  <a href="index.html#contact" class="mobile-link">contact us</a>
  <a href="admin.html" class="mobile-link">admin</a>

<!-- HERO -->
<section class="pg-hero" id="pgHero">
  <h1 class="pg-hero-title">tom' and dom'</h1>
  <p class="pg-hero-sub">A COLLECTION OF POEMS</p>
  <div class="pg-search-wrap" role="search">
    <input type="text" class="pg-search-input" id="pgSearchInput" placeholder="explore poems" aria-label="Search poems"/>
    <button class="pg-search-btn" id="pgSearchBtn" aria-label="Search">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5" stroke-width="1.5"/>
        <path d="M11 11L14.5 14.5" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</section>

<!-- POEM GRID -->
<section class="poem-grid-section">
  <p class="poems-count" id="poemsCount"></p>
  <div class="poem-grid" id="poemGrid">
    <div class="poems-loading"><div class="spinner"></div></div>
  </div>
</section>

<!-- POEM MODAL -->
<div class="poem-modal-overlay" id="poemModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="poem-modal">
    <button class="poem-modal-close" id="modalClose" aria-label="Close poem">&times;</button>
    <p class="poem-modal-date" id="modalDate"></p>
    <h2 class="poem-modal-title" id="modalTitle"></h2>
    <p class="poem-modal-body" id="modalBody"></p>
    
    <div class="modal-like-section" style="margin: 20px 0; display: flex; align-items: center; gap: 15px; border-top: 1px solid #333; padding-top: 15px;">
      <button id="modalLikeBtn" style="background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 16px; cursor: pointer; font-family: 'Playfair Display', serif; display: flex; align-items: center; gap: 8px; transition: all 0.2s;">
        <i class="fa-regular fa-heart"></i> Like
      </button>
      <span id="modalLikeCount" style="font-family: 'Playfair Display', serif; color: #bbb;">0 likes</span>
    </div>

    <div class="poem-modal-tags" id="modalTags"></div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>Made with love for literature &amp; tom. &copy; <span id="footerYear"></span> tom' and dom'</p>
</footer>

<script type="module" src="poems-script.js"></script>
</body>
</html>
