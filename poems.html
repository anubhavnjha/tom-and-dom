</head>

    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-nav" id="mobileNav" aria-hidden="true">
  <a href="index.html" class="mobile-link">home</a>
  <a href="poems.html" class="mobile-link">poems</a>

<section style="margin-top: 100px;" class="dark-section">
  <div class="sec-inner">
    <h1 style="text-align: center; font-family: 'IM Fell English', serif; font-size: 3.5rem; margin-bottom: 20px; font-style: italic;">the verses</h1>
    <p style="text-align: center; margin-bottom: 40px; opacity: 0.6;">A library of dynamic emotional journeys and quiet declarations.</p>
    
    <div style="display: flex; margin-bottom: 40px; border-bottom: 1px solid rgba(247,243,237,0.15);">
      <input type="text" id="poemsSearch" class="hero-input" placeholder="Search verses by title or line keywords..." style="font-size: 1rem;">
    </div>

    <div class="poem-grid" id="poemsContainer">
      <p style="text-align: center; grid-column: 1/-1;">Tuning the database strings, please wait...</p>
    </div>
  </div>
</section>

<div class="modal-overlay" id="poemModal">
  <div class="modal-content">
    <button class="modal-close" id="closeModalBtn">&times;</button>
    <p id="modalDate" style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 10px;"></p>
    <h2 id="modalTitle" style="font-family: 'IM Fell English', serif; font-size: 2.5rem; font-style: italic; margin-bottom: 25px;"></h2>
    <p id="modalBody" style="white-space: pre-line; font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px;"></p>
    
    <div style="display: flex; gap: 15px; border-top: 1px solid rgba(247,243,237,0.15); padding-top: 20px;">
      <button id="likeBtn" style="background: transparent; border: 1px solid #f7f3ed; color: #f7f3ed; padding: 10px 20px; font-family: inherit; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; transition: 0.3s;">
        <i class="fa-regular fa-heart"></i> <span id="likeBtnText">Like Verse</span>
      </button>
      <span id="likeCounter" style="display: flex; align-items: center; font-size: 0.9rem; opacity: 0.7;">0 likes</span>
    </div>
  </div>
</div>

<footer>
  <p>Made with love for literature &amp; tom. © <span id="footerYear">2026</span> tom' and dom'</p>
</footer>

<script type="module" src="poems-script.js"></script>
<script src="script.js"></script>
