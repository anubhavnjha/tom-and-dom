<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>poems — tom' and dom'</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

  <nav id="navbar">
    <a href="index.html" class="logo">
      <img src="assets/images/tom-and-dom-logo.png" alt="tom' and dom' logo" class="logo-img">
    </a>
    <ul class="nav-links">
      <li><a href="index.html">home</a></li>
      <li><a href="poems.html">poems</a></li>
      <li><a href="index.html#about">about us</a></li>
      <li><a href="index.html#contact">contact us</a></li>
      <li><a href="research.html" target="_blank">research</a></li>
    </ul>
  </nav>

  <section style="margin-top: 50px;">
    <h1 style="text-align: center; font-family: 'IM Fell English', serif; font-size: 3rem; margin-bottom: 40px; font-style: italic;">the verses</h1>
    <div style="max-width: 800px; margin: 0 auto;" id="poemsContainer">
      <p style="text-align: center;">tuning the strings, please wait...</p>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBXRNFclGzJdwkdhfDaP1zbsufdd_RkHBA",
      authDomain: "tom-and-dom.firebaseapp.com",
      databaseURL: "https://tom-and-dom-default-rtdb.firebaseio.com",
      projectId: "tom-and-dom",
      storageBucket: "tom-and-dom.firebasestorage.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'poems'), (snapshot) => {
      const container = document.getElementById('poemsContainer');
      const data = snapshot.val();
      
      if (!data) {
        container.innerHTML = "<p style='text-align: center;'>No verses written down yet.</p>";
        return;
      }

      container.innerHTML = "";
      Object.keys(data).reverse().forEach(key => {
        const item = data[key];
        const views = item.views || 0;
        const likes = item.likes || 0;

        // Auto-increment view once per load
        update(ref(db, `poems/${key}`), { views: views + 1 });

        const poemCard = document.createElement('div');
        poemCard.className = 'content-card';
        poemCard.innerHTML = `
          <h2>${item.title}</h2>
          <small style="opacity: 0.5; display: block; margin-bottom: 15px;">${item.date || ''}</small>
          <p style="white-space: pre-line; margin-bottom: 20px;">${item.body}</p>
          <div style="display: flex; gap: 20px; align-items: center; border-top: 1px solid rgba(247,243,237,0.1); padding-top: 15px; font-size: 0.9rem;">
            <span><i class="fa-regular fa-eye"></i> ${views + 1} views</span>
            <button id="like-${key}" style="background: none; border: none; color: #f7f3ed; cursor: pointer;">
              <i class="fa-regular fa-heart"></i> <span id="like-count-${key}">${likes}</span> likes
            </button>
          </div>
        `;
        container.appendChild(poemCard);

        // Simple Like Interceptor
        document.getElementById(`like-${key}`).addEventListener('click', () => {
          update(ref(db, `poems/${key}`), { likes: likes + 1 });
        }, { once: true });
      });
    });

    window.addEventListener('scroll', () => {
      if (window.scrollY > 50) {
        document.getElementById('navbar').classList.add('scrolled');
        document.body.classList.add('scrolled');
      } else {
        document.getElementById('navbar').classList.remove('scrolled');
        document.body.classList.remove('scrolled');
      }
    });
  </script>
</body>
</html>
