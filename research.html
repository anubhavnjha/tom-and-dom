  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
</head>
<body>

  <a href="index.html#hero" class="nav-logo">

  <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-nav" id="mobileNav" aria-hidden="true">
  <a href="index.html" class="mobile-link">home</a>
  <a href="poems.html" class="mobile-link">poems</a>

</div>

<section style="margin-top: 100px;" class="dark-section">
  <div class="sec-inner">
    <h1 style="text-align: center; font-family: 'IM Fell English', serif; font-size: 3.5rem; margin-bottom: 20px; font-style: italic;">research &amp; writing</h1>
    <p style="text-align: center; margin-bottom: 50px; opacity: 0.6;">Academic work, literary critiques, and analytical projects.</p>
    
    <div class="research-grid" id="researchContainer">
      <p style="text-align: center; grid-column: 1/-1;">Reading academic database, please wait...</p>
    </div>
  </div>
</section>

<div class="modal-overlay" id="researchModal">
  <div class="modal-content" style="max-width: 800px;">
    <button class="modal-close" id="closeResearchBtn">&times;</button>
    <p id="rModalDate" style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 10px;"></p>
    <h2 id="rModalTitle" style="font-family: 'IM Fell English', serif; font-size: 2.3rem; font-style: italic; margin-bottom: 25px;"></h2>
    <p id="rModalBody" style="white-space: pre-line; font-size: 1.05rem; line-height: 1.8; text-align: justify;"></p>
  </div>
</div>

<footer>
  <p>Made with love for literature &amp; tom. © <span id="footerYear">2026</span> tom' and dom'</p>
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBXRNFclGzJdwkdhfDaP1zbsufdd_RkHBA",
    authDomain: "tom-and-dom.firebaseapp.com",
    databaseURL: "https://tom-and-dom-default-rtdb.firebaseio.com",
    projectId: "tom-and-dom",
    storageBucket: "tom-and-dom.firebasestorage.app"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const rContainer = document.getElementById('researchContainer');
  const rModal = document.getElementById('researchModal');
  const rClose = document.getElementById('closeResearchBtn');
  const rTitle = document.getElementById('rModalTitle');
  const rDate = document.getElementById('rModalDate');
  const rBody = document.getElementById('rModalBody');

  onValue(ref(db, 'research'), (snapshot) => {
    const data = snapshot.val();
    if (!data) {
      rContainer.innerHTML = `<p style="text-align: center; grid-column: 1/-1;">No research papers published yet.</p>`;
      return;
    }

    rContainer.innerHTML = "";
    Object.keys(data).reverse().forEach(key => {
      const item = data[key];
      const card = document.createElement('div');
      card.className = 'content-card';
      card.innerHTML = `
        <h3 class="card-title" style="font-size: 1.6rem;">${item.title}</h3>
        <span class="card-date">${item.date || 'Undated'}</span>
        <p class="card-snippet">${item.body.split('\n').slice(0, 3).join('<br>')}...</p>
      `;
      card.addEventListener('click', () => {
        rTitle.textContent = item.title;
        rDate.textContent = item.date || 'Undated';
        rBody.textContent = item.body;
        rModal.classList.add('open');
      });
      rContainer.appendChild(card);
    });
  });

  rClose.addEventListener('click', () => rModal.classList.remove('open'));
</script>
<script src="script.js"></script>
</body>
</html>
