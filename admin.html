<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Portal — tom' and dom'</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="admin-box" id="adminBox" style="display: none;">
    <h2>Publish Live Content</h2>
    
    <label style="display:block; margin-bottom:5px;">Where are you publishing?</label>
    <select id="contentType" class="form-field">
      <option value="poems">Publish Poem</option>
      <option value="research">Publish Research Paper</option>
    </select>

    <input type="text" id="postTitle" class="form-field" placeholder="Document Title" required>
    <input type="text" id="postDate" class="form-field" placeholder="Publication Date (e.g., July 14, 2026)" required>
    <textarea id="postBody" class="form-field" rows="10" placeholder="Type or paste contents here..." required></textarea>

    <button id="btnPublish" class="btn-submit">Publish Live</button>
  </div>

  <script type="module" src="admin-script.js"></script>
</body>
</html>
